<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>清心</title>

<style>

body{
    margin:0;
    height:100vh;
    background:black;
    color:white;

    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;

    font-family:"KaiTi";
}

h1{
    font-size:90px;
    letter-spacing:20px;

    opacity:0;

    animation:fade 4s forwards;
}

p{
    color:#cccccc;
    font-size:22px;
}

@keyframes fade{

    from{
        opacity:0;
        transform:translateY(40px);
    }

    to{
        opacity:1;
        transform:translateY(0);
    }

}

</style>
</head>

<body>

<h1>清</h1>

<p>心若清明，万象自见</p>

</body>
</html>

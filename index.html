<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>InnerEgg Studio</title>

<style>
body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:#f3f1ef;
font-family:Arial,sans-serif;
color:#222;
}

.container{
text-align:center;
max-width:600px;
padding:40px;
}

.logo{
width:220px;
margin-bottom:30px;
}

textarea{
width:100%;
height:140px;
border:none;
border-radius:25px;
padding:20px;
font-size:16px;
background:white;
box-shadow:0 10px 30px rgba(0,0,0,0.06);
resize:none;
outline:none;
}

button{
margin-top:20px;
padding:14px 30px;
border:none;
border-radius:30px;
background:black;
color:white;
font-size:15px;
cursor:pointer;
}

p{
color:#666;
line-height:1.8;
}
</style>
</head>

<body>

<div class="container">

<img src="logo.png" class="logo">

<p>
Put emotions into a container,<br>
not onto people.
</p>

<textarea placeholder="Type what you really feel..."></textarea>

<br>

<button>Release</button>

</div>

</body>
</html>

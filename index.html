<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>InnerEgg</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  background: radial-gradient(circle at top,#f7f3f0,#eef2f5,#f3edeb);
  font-family: Arial, sans-serif;
}

/* logo */
.logo{
  width:220px;
  margin-bottom:40px;
}

/* container */
.box{
  width:90%;
  max-width:520px;
  background:rgba(255,255,255,0.6);
  backdrop-filter: blur(10px);
  border-radius:30px;
  padding:25px;
  box-shadow:0 20px 60px rgba(0,0,0,0.08);
}

textarea{
  width:100%;
  height:140px;
  border-radius:20px;
  border:1px solid rgba(0,0,0,0.1);
  padding:15px;
  outline:none;
  font-size:14px;
}

button{
  margin-top:15px;
  width:100%;
  padding:14px;
  border:none;
  border-radius:20px;
  background:#111;
  color:white;
  font-size:14px;
}

.small{
  margin-top:15px;
  font-size:12px;
  color:#999;
  text-align:center;
}
</style>
</head>

<body>

<!-- LOGO -->
<img class="logo" src="logo.png" />

<!-- INPUT -->
<div class="box">
  <textarea placeholder="把你现在的情绪写在这里..."></textarea>
  <button>丢进容器</button>
  <div class="small">You are safe here. No judgment.</div>
</div>

</body>
</html>

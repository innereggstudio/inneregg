<style>

*{
    box-sizing:border-box;
}


body{

    margin:0;

    min-height:100vh;

    display:flex;

    justify-content:center;

    align-items:center;

    font-family:
    "Noto Serif SC",
    "Microsoft YaHei",
    serif;

    background:
    linear-gradient(
    135deg,
    #f5efe6,
    #e8eee5,
    #f7f3ed
    );

    color:#333;

}


/* 主容器 */

.container{

    width:90%;

    max-width:700px;

    text-align:center;

}


/* Logo */

.logo{

    width:180px;

    margin-bottom:30px;

}


/* 标题 */

h1{

    font-size:42px;

    letter-spacing:6px;

    font-weight:400;

    margin:10px;

}


.subtitle{

    font-size:18px;

    color:#777;

    letter-spacing:2px;

    margin-bottom:40px;

}


/* 介绍 */

.intro{

    background:
    rgba(255,255,255,0.55);

    padding:30px;

    border-radius:30px;

    backdrop-filter:blur(10px);

    box-shadow:
    0 20px 50px rgba(0,0,0,0.08);

    line-height:2;

    margin-bottom:30px;

}


/* 输入区域 */

textarea{

    width:100%;

    height:130px;

    border:none;

    border-radius:25px;

    padding:20px;

    font-size:16px;

    resize:none;

}


textarea:focus{

    outline:none;

}


/* 按钮 */

button{

    margin-top:20px;

    width:100%;

    padding:15px;

    border:none;

    border-radius:25px;

    background:#3d4035;

    color:white;

    font-size:16px;

}


/* 三个入口 */


.menu{

    display:flex;

    gap:15px;

    margin-top:35px;

}


.card{

    flex:1;

    background:
    rgba(255,255,255,0.5);

    padding:20px 10px;

    border-radius:25px;

    font-size:15px;

}


/* 底部 */

.footer{

    margin-top:35px;

    font-size:13px;

    color:#888;

}


@media(max-width:600px){

.menu{

flex-direction:column;

}


h1{

font-size:32px;

}

}


</style>

</head>
